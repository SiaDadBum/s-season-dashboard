const bc = arr => { let c=0; return arr.map(v=>{ c+=Math.max(v,0); return c; }); };

function calcSeason(d) {
  const scale = d.t_ops / d.p_ops;
  const n = d.t_weekly.length;
  const t_sync = d.t_weekly.reduce((a,b)=>a+Math.max(b,0),0);
  const p_sync = d.p_sync_n.reduce((a,b)=>a+Math.max(b,0),0);
  const est = [...d.t_weekly, ...d.p_weekly.slice(n).map(v=>Math.max(v,0)*scale)];
  const p_cumul = bc(d.p_weekly);
  const t_cumul = bc(d.t_weekly);
  const e_cumul = bc(est);
  const p_total = d.p_weekly.reduce((a,b)=>a+Math.max(b,0),0);
  // 전년 연말 잔여 (전년 운영재고 - 전년 전체판매)
  const p_yearend_remain = d.p_ops - p_total;
  // 올해 예측 연말 잔여
  const t_est_total = e_cumul[52];
  const t_yearend_remain = d.t_ops - t_est_total;
  // 10주 이후 YoY 판매 비교
  const p_after_sync = d.p_weekly.slice(n).reduce((a,b)=>a+Math.max(b,0),0);
  const t_after_sync = est.slice(n).reduce((a,b)=>a+Math.max(b,0),0);
  const yoy_sales_diff = t_after_sync - p_after_sync;           // 절대차이
  const yoy_sales_rate = p_after_sync>0 ? t_after_sync/p_after_sync : 1; // 배율
  return { scale, t_sync, p_sync, est, p_cumul, t_cumul, e_cumul, p_total,
           p_yearend_remain, t_yearend_remain, t_est_total,
           p_after_sync, t_after_sync, yoy_sales_diff, yoy_sales_rate,
           yoy: (t_sync/d.t_ops)/(p_sync/d.p_ops) };
}

const Tip = ({active,payload,label}) => {
  if(!active||!payload?.length) return null;
  return (
    <div style={{background:'#0a1020',border:`1px solid ${C.border}`,borderRadius:8,padding:'10px 14px',fontSize:12}}>
      <p style={{color:C.muted,marginBottom:6,fontWeight:600}}>{label}</p>
      {payload.filter(p=>p.value!=null&&p.value!==0).map((p,i)=>(
        <p key={i} style={{color:p.color||C.text,margin:'2px 0'}}>
          {p.name}: <strong>{typeof p.value==='number'?(p.value/1e8).toFixed(2)+'억':p.value}</strong>

      ))}
    </div>
  );
};

    </div>
  </div>
);

// ══════════════════════════════════════════════════════
// MAIN
// ══════════════════════════════════════════════════════
function App() {
  const [mainTab, setMainTab] = useState('now');
  const [skView,  setSkView]  = useState('ALL');
  const [scenario, setScenario] = useState('base'); // base | optimistic | detail | conservative

  // 현재 뷰에 따른 데이터 선택
  const V = useMemo(()=>{
    if(skView==='25S') return {
      d:D25, calc:C25,
      ops:D25.t_ops, p_ops:D25.p_ops,
      t9:D25.t_weekly, t9r:D25.t_weekly_r,
      pw:D25.p_weekly, ps9:D25.p_sync_n,
      ec:C25.e_cumul,  pc:C25.p_cumul, tc:C25.t_cumul,
      dt_ec:DT25_EC, dt_ops:DT25_OPS, dt_segs:DT25_SEGS,
      label:'25S', color:C.s25,
      p_yearend_remain: C25.p_yearend_remain,
      t_yearend_remain: C25.t_yearend_remain,
      dt_yearend_remain: DT25_OPS - DT25_EC[52],
      p_total: C25.p_total, t_est_total: C25.t_est_total,
      yoy_sales_diff: C25.yoy_sales_diff,
      p_after_sync: C25.p_after_sync,
      prev_yearend_stock: YEAREND_STOCK.PREV_24S,
      this_yearend_stock: YEAREND_STOCK.THIS_25S,
    };
    if(skView==='24S') return {
      d:D24, calc:C24,
      ops:D24.t_ops, p_ops:D24.p_ops,
      t9:D24.t_weekly, t9r:D24.t_weekly_r,
      pw:D24.p_weekly, ps9:D24.p_sync_n,
      ec:C24.e_cumul,  pc:C24.p_cumul, tc:C24.t_cumul,
      dt_ec:DT24_EC, dt_ops:DT24_OPS, dt_segs:DT24_SEGS,
      label:'24S', color:C.s24,
      p_yearend_remain: C24.p_yearend_remain,
      t_yearend_remain: C24.t_yearend_remain,
      dt_yearend_remain: DT24_OPS - DT24_EC[52],
      p_total: C24.p_total, t_est_total: C24.t_est_total,
      yoy_sales_diff: C24.yoy_sales_diff,
      p_after_sync: C24.p_after_sync,
      prev_yearend_stock: YEAREND_STOCK.PREV_23S,
      this_yearend_stock: YEAREND_STOCK.THIS_24S,
    };
    return {
      d:null, calc:null,
      ops:ALL_OPS, p_ops:ALL_PREV_OPS,
      t9:ALL_T9, t9r:D25.t_weekly_r.map((v,i)=>v+D24.t_weekly_r[i]),
      pw:ALL_PREV, ps9:ALL_PSYNC,
      ec:ALL_EC, pc:ALL_PC, tc:ALL_T9CUM,
      dt_ec:DT_ALL_EC, dt_ops:DT25_OPS+DT24_OPS, dt_segs:null,
      label:'전체', color:C.all,
      p_yearend_remain: ALL_P_YEAREND_REMAIN,
      t_yearend_remain: ALL_T_YEAREND_REMAIN,
      dt_yearend_remain: (DT25_OPS+DT24_OPS) - DT_ALL_EC[52],
      p_total: ALL_P_TOTAL, t_est_total: ALL_T_EST_TOTAL,
      yoy_sales_diff: ALL_YOY_DIFF,
      p_after_sync: ALL_P_AFTER,
      prev_yearend_stock: PREV_YEAREND_STOCK_ALL,
      this_yearend_stock: THIS_YEAREND_STOCK_ALL,
    };
  },[skView]);

  const tsync = V.t9.reduce((a,b)=>a+Math.max(b,0),0);
  const psync = V.ps9.reduce((a,b)=>a+Math.max(b,0),0);
  const yoy   = (tsync/V.ops)/(psync/V.p_ops);
  const finalSales  = V.ec[52];
  const finalRemain = V.ops - finalSales;

  // ── 시나리오별 예측 커뮬 ──
  // base: 기본추정(전년패턴), detail: 품목/성별 세부추정, optimistic: +10%p, conservative: -10%p
  const S_EC = (()=>{
    const n = V.t9.length;
    const baseRate = V.t_est_total / V.ops;
    if(scenario==='base')    return V.ec;
    if(scenario==='detail')  return V.dt_ec;
    const dtRate = V.dt_ec[52] / V.ops;
    if(scenario==='optimistic') {
      const adj   = Math.min(dtRate + 0.10, 1.0);
      const scale = adj / (dtRate||baseRate);
      return V.dt_ec.map((v,i)=> i<n ? v : Math.min(tsync + (v-tsync)*scale, V.ops));
    }
    if(scenario==='conservative') {
      const adj   = Math.max(dtRate - 0.10, 0);
      const scale = adj / (dtRate||baseRate);
      return V.dt_ec.map((v,i)=> i<n ? v : Math.min(tsync + (v-tsync)*scale, V.ops));
    }
    if(scenario==='gap') {
      // 전년 소진율 × 10주 페이스 GAP — 세그먼트별 pred 소진율 가중합
      const gapSegs = V.label==='25S' ? GAP_SEGS_25 : V.label==='24S' ? GAP_SEGS_24
        : [...GAP_SEGS_25, ...GAP_SEGS_24];
      const gapSales = gapSegs.reduce((s,r)=>s+r.t_ops*r.pred, 0);
      const gapOps   = gapSegs.reduce((s,r)=>s+r.t_ops, 0);
      const gapRate  = gapOps > 0 ? gapSales/gapOps : 0;
      const scale    = gapRate / (V.dt_ec[52]/V.ops || baseRate);
      return V.dt_ec.map((v,i)=> i<n ? v : Math.min(tsync + (v-tsync)*scale, V.ops));
    }
    if(scenario==='closure') {
      // 여주·제주 신세계 폐점 — 매출 비중 34.9%
      // 14주(4/6, idx=13)부터 예측 판매액에 (1-0.349) 곱함
      // 판매율에서 빼는 게 아니라 예측 판매 규모 자체를 줄이는 방식
      const CLOSURE_START = 13;
      const CLOSURE_MULT = 1 - 0.349; // 0.651
      return V.dt_ec.map((v,i)=> {
        if(i < n) return v; // 실측 구간: 그대로
        // 14주 이전 예측: 세부추정 그대로
        if(i < CLOSURE_START) return V.dt_ec[i];
        // 14주 이후: 14주 시작점(tsync)에서 세부추정 증분에 0.651 곱함
        const dtAtStart = V.dt_ec[CLOSURE_START-1]; // 13주까지 누적
        return Math.min(dtAtStart + (v - dtAtStart) * CLOSURE_MULT, V.ops);
      });
    }
    return V.ec;
  })();

  const S_SALES   = S_EC[52];                  // 시나리오 연말 총판매
  const S_REMAIN  = V.ops - S_SALES;           // 시나리오 연말 잔여
  const S_831     = S_EC[34];                  // 시나리오 8/31 누적

  // 차트 데이터
  const weekData = LABELS_53.map((wl,i)=>({
    week: wl,
    prev:  Math.max(V.pw[i]||0,0),
    actual:i<V.t9.length ? Math.max(V.t9[i]||0,0) : null,
    prev_c:V.pc[i],
    est_c: V.ec[i],
    dt_c:  V.dt_ec[i],
    sc_c:  S_EC[i],
    act_c: i<V.tc.length?V.tc[i]:null,
    isNow: i===V.t9.length-1,
  }));

  // 월별
  const PMAP = {'1-2월':[1,2],'3-4월':[3,4],'5-6월':[5,6],'7-8월':[7,8],'9월↑':[9,10,11,12]};
  const getP = wl => { const m=parseInt(wl); for(const[p,ms] of Object.entries(PMAP)) if(ms.includes(m)) return p; return '9월↑'; };
  const periodData = useMemo(()=>{
    const r={}; Object.keys(PMAP).forEach(p=>r[p]={period:p,prev:0,est:0,act:0});
    LABELS_53.forEach((wl,i)=>{
      const p=getP(wl);
      r[p].prev+=Math.max(V.pw[i]||0,0);
      r[p].est +=(V.ec[i]-(i>0?V.ec[i-1]:0))||0;
      if(i<V.t9.length) r[p].act+=Math.max(V.t9[i]||0,0);
    });
    return Object.values(r);
  },[skView]);

  const S={fontFamily:"'Pretendard','Apple SD Gothic Neo',sans-serif",color:C.text};

  return (
    <div style={{...S,background:C.bg,minHeight:'100vh',padding:'22px 26px'}}>

      {/* 헤더 */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:18}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:3}}>
            <div style={{width:4,height:24,background:C.accent,borderRadius:2}}/>
            <h1 style={{margin:0,fontSize:19,fontWeight:900,letterSpacing:-.3}}>S시즌 이월재고 소진 분석</h1>
            <span style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:'3px 11px',fontSize:10,color:C.muted}}>기준 2026-03-08</span>
          </div>
          <p style={{margin:0,color:C.muted,fontSize:11,paddingLeft:14}}>
            올해 운영재고 <strong style={{color:C.s25}}>25S {억(D25.t_ops)}</strong> + <strong style={{color:C.s24}}>24S {억(D24.t_ops)}</strong> = <strong style={{color:C.text}}>{억(ALL_OPS)}</strong>
            &nbsp;·&nbsp; 전년 대비 <strong style={{color:C.warn}}>{ALL_OPS>=ALL_PREV_OPS?'+':''}{((ALL_OPS/ALL_PREV_OPS-1)*100).toFixed(1).replace('-','△')}%</strong>
          </p>
        </div>
        <div style={{display:'flex',gap:12,fontSize:11}}>
          <div style={{textAlign:'center',background:C.card,borderRadius:8,padding:'8px 14px',border:`1px solid ${C.s25}44`}}>
            <p style={{margin:'0 0 2px',color:C.s25,fontWeight:700}}>25S (1년차)</p>
            <p style={{margin:0,color:C.text,fontSize:14,fontWeight:800}}>{억(D25.t_ops)}</p>
            <p style={{margin:'2px 0 0',color:C.muted,fontSize:10}}>전년 24S {억(D25.p_ops)}</p>
          </div>
          <div style={{textAlign:'center',background:C.card,borderRadius:8,padding:'8px 14px',border:`1px solid ${C.s24}44`}}>
            <p style={{margin:'0 0 2px',color:C.s24,fontWeight:700}}>24S (2년차)</p>
            <p style={{margin:0,color:C.text,fontSize:14,fontWeight:800}}>{억(D24.t_ops)}</p>
            <p style={{margin:'2px 0 0',color:C.muted,fontSize:10}}>전년 23S {억(D24.p_ops)}</p>
          </div>
        </div>
      </div>

      {/* 시즌 토글 + 시나리오 토글 */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
        <SeasonToggle view={skView} setView={setSkView}/>
        <ScenarioToggle sc={scenario} setSc={setScenario}/>
      </div>
      {/* 시나리오별 예측 방식 설명 */}
      <div style={{marginBottom:14,padding:'7px 14px',borderRadius:8,background:'#0d1829',border:`1px solid ${SCENARIO_DESC[scenario]?.color}44`}}>
        <span style={{fontSize:10,fontWeight:700,color:SCENARIO_DESC[scenario]?.color}}>📐 예측 방식 ({SCENARIOS.find(s=>s.key===scenario)?.label})</span>
        <span style={{fontSize:10,color:'#8faec8',marginLeft:8}}>{SCENARIO_DESC[scenario]?.text}</span>
      </div>

      {/* KPI — 5카드 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10,marginBottom:16}}>

        {/* 1. 운영재고 */}
        <div style={{background:C.card,borderRadius:10,padding:'14px 18px',border:`1px solid ${C.border}`}}>
          <p style={{color:C.muted,fontSize:10,margin:'0 0 5px',textTransform:'uppercase',letterSpacing:.8}}>운영재고</p>
          <p style={{color:V.color,fontSize:20,fontWeight:800,margin:0}}>{억(V.ops)}</p>
          <p style={{margin:'4px 0 0',fontSize:11,fontWeight:600,color:cmp(V.ops,V.p_ops,V.color,'전년').color}}>
            {cmp(V.ops,V.p_ops,V.color,'전년').arrow} {cmp(V.ops,V.p_ops,V.color,'전년').text}
          </p>
          <p style={{color:C.muted,fontSize:10,margin:'3px 0 0'}}>전년 {억(V.p_ops)}</p>
          <div style={{marginTop:8,borderTop:`1px solid ${C.border}`,paddingTop:7,display:'flex',flexDirection:'column',gap:3}}>
            <p style={{margin:0,fontSize:9,color:C.muted,fontWeight:600}}>📦 재고 구성</p>
            <p style={{margin:0,fontSize:9,color:C.muted}}>25년 기말재고 + 26년 입고</p>
            <p style={{margin:0,fontSize:9,color:C.muted}}>26년 입고 현재 0 → 기말재고 = 운영재고</p>
          </div>
        </div>

        {/* 2. 1~10주 누적판매 (실측) */}
        <KPI label="1~10주 누적판매" value={억2(tsync)}
          compare={cmp(tsync, psync, V.color, '전년 동기')}
          sub={`판매율 ${pct(tsync,V.ops)} · 전년 동기 ${(psync/V.p_ops*100).toFixed(1)}%`}
          badge={{t:'실데이터',c:V.color}}/>

        {/* 3. ~08/31 누적 예상 — 시나리오 연동 */}
        <KPI label="~08/31 누적 예상" value={억(S_831)}
          compare={cmp(S_831, V.pc[34], V.color, '전년 동기')}
          sub={`판매율 ${(S_831/V.ops*100).toFixed(1)}% · 전년 ${(V.pc[34]/V.p_ops*100).toFixed(1)}%`}/>

        {/* 4. 연간 추정 총판매 — 시나리오 연동 */}
        <KPI label="연간 추정 총판매" value={억(S_SALES)}
          compare={cmp(S_SALES, V.p_total, V.color, '전년')}
          sub={`판매율 ${(S_SALES/V.ops*100).toFixed(1)}% · 전년 ${(V.p_total/V.p_ops*100).toFixed(1)}%`}/>

        {/* 5. 연말 잔여 예상 — 시나리오 연동 */}
        <KPI label="연말 잔여 예상" value={억(S_REMAIN)}
          compare={cmp(S_REMAIN, V.prev_yearend_stock, S_REMAIN<V.prev_yearend_stock?C.good:C.bad, '전년 기말재고')}
          sub={`전년 기말재고 ${억(V.prev_yearend_stock)}`}
          color={C.bad}/>

      </div>

      {/* 메인 탭 */}
      <div style={{display:'flex',gap:3,marginBottom:16,background:C.card,borderRadius:8,padding:4,width:'fit-content',border:`1px solid ${C.border}`}}>
        {[['now','📍 현재 페이스'],['forecast','📈 소진 예측'],['segment','👥 세그먼트'],['insight','💡 전년 인사이트']].map(([k,l])=>(
          <Tab key={k} active={mainTab===k} onClick={()=>setMainTab(k)}>{l}</Tab>
        ))}
      </div>

      {/* ── 현재 페이스 ── */}
      {mainTab==='now' && (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <div style={{gridColumn:'1/-1'}}>
            {(()=>{
              // 전년 주요 시점 수치 (시즌별)
              const p_ops   = skView==='ALL'?ALL_PREV_OPS:skView==='25S'?D25.p_ops:D24.p_ops;
              const pc      = skView==='ALL'?ALL_PC:skView==='25S'?C25.p_cumul:C24.p_cumul;
              const p_10w   = skView==='ALL'?ALL_PSYNC_TOT:skView==='25S'?C25.p_sync:C24.p_sync;
              const p_831   = pc[34];  // ~8/31 누적
              const p_year  = pc[52];  // 연말 누적
              const p_831r  = p_ops - p_831;   // 8/31 잔여
              const p_yearr = p_ops - p_year;  // 연말 잔여
              return (
                <PrevInsight items={[
                  {label:'전년 동기 10주',   desc:`${억2(p_10w)} / 판매율 ${(p_10w/p_ops*100).toFixed(1)}%`},
                  {label:'전년 시즌마감(~8/31)', desc:`누적판매 ${억(p_831)} (${(p_831/p_ops*100).toFixed(1)}%) · 잔여재고 ${억(p_831r)} (${(p_831r/p_ops*100).toFixed(1)}%)`},
                  {label:'전년 연말마감',    desc:`누적판매 ${억(p_year)} (${(p_year/p_ops*100).toFixed(1)}%) · 잔여재고 ${억(p_yearr)} (${(p_yearr/p_ops*100).toFixed(1)}%)`},
                ]}/>
              );
            })()}
          </div>

          {/* 주차별 실판매 vs 전년 */}
          <div style={{background:C.card,borderRadius:12,padding:18,border:`1px solid ${C.border}`}}>
            <h3 style={{margin:'0 0 3px',fontSize:13}}>주차별 판매 — 올해 실적 vs 전년 동기 <SKBadge sk={skView}/></h3>
            <p style={{margin:'0 0 12px',fontSize:10,color:C.muted}}>03/01 주 선행 판매 상승 중</p>
            <ResponsiveContainer width="100%" height={200}>
              <BarChart data={WEEKS_ACT.map((wl,i)=>({
                week:wl,
                prev:Math.max(V.ps9[i]||0,0),
                actual:Math.max(V.t9[i]||0,0),
              }))} barCategoryGap="30%" barGap={3}>
                <CartesianGrid strokeDasharray="3 3" stroke="#0a1020"/>
                <XAxis dataKey="week" tick={{fill:C.muted,fontSize:10}}/>
                <YAxis tickFormatter={v=>(v/1e8).toFixed(2)} tick={{fill:C.muted,fontSize:9}} unit="억"/>
                <Tooltip content={<Tip/>}/>
                <Legend wrapperStyle={{color:C.muted,fontSize:11}}/>
                <Bar dataKey="prev"   name="전년 동기" fill={C.prev}    radius={[3,3,0,0]}/>
                <Bar dataKey="actual" name="올해 실적" fill={V.color}   radius={[3,3,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </div>

          {/* 누적 판매율 */}
          <div style={{background:C.card,borderRadius:12,padding:18,border:`1px solid ${C.border}`}}>
            <h3 style={{margin:'0 0 3px',fontSize:13}}>누적 판매율 추이 <SKBadge sk={skView}/></h3>
            <p style={{margin:'0 0 12px',fontSize:10,color:C.muted}}>
              {`올해 ${(tsync/V.ops*100).toFixed(1)}% — 전년 동기 ${(psync/V.p_ops*100).toFixed(1)}% 대비 ${((tsync/V.ops-psync/V.p_ops)*100).toFixed(1)}%p`}
            </p>
            <ResponsiveContainer width="100%" height={200}>
              <LineChart data={WEEKS_ACT.map((wl,i)=>({
                week:wl,
                prev_r: (V.pc[i]||0)/V.p_ops*100,
                this_r: (V.tc[i]||0)/V.ops*100,
              }))}>
                <CartesianGrid strokeDasharray="3 3" stroke="#0a1020"/>
                <XAxis dataKey="week" tick={{fill:C.muted,fontSize:10}}/>
                <YAxis domain={[0,15]} unit="%" tick={{fill:C.muted,fontSize:9}}/>
                <Tooltip formatter={v=>`${v.toFixed(2)}%`} contentStyle={{background:'#0a1020',border:`1px solid ${C.border}`}} labelStyle={{color:C.text}}/>
                <Legend wrapperStyle={{color:C.muted,fontSize:11}}/>
                <Line dataKey="prev_r" name="전년 누적판매율" stroke={C.prev}   strokeWidth={2} dot={false} strokeDasharray="5 3"/>
                <Line dataKey="this_r" name="올해 누적판매율" stroke={V.color}  strokeWidth={2.5} dot={{fill:V.color,r:3}}/>
              </LineChart>
            </ResponsiveContainer>
          </div>

          {/* 25S vs 24S 나란히 (전체 뷰에서만) */}
          {skView==='ALL' && (
            <div style={{background:C.card,borderRadius:12,padding:18,border:`1px solid ${C.border}`,gridColumn:'1/-1'}}>
              <h3 style={{margin:'0 0 12px',fontSize:13}}>시즌별 10주 판매율 비교</h3>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                {[{d:D25,calc:C25,color:C.s25},{d:D24,calc:C24,color:C.s24}].map(({d,calc,color})=>{

                    <Bar dataKey="act_all"  name="올해 실측"  fill={scColor} radius={[3,3,0,0]} opacity={0.7}  barSize={28}/>
                    <Line dataKey="sc_all" name={`전체 예측(${SCENARIOS.find(x=>x.key===scenario)?.label})`} stroke={scColor} strokeWidth={2.5} dot={{fill:scColor,r:4}}/>
                    <Line dataKey="sc_25"  name="25S 예측"  stroke={C.s25}  strokeWidth={2} dot={{fill:C.s25,r:3}}  strokeDasharray="5 2"/>
                    <Line dataKey="sc_24"  name="24S 예측"  stroke={C.s24}  strokeWidth={2} dot={{fill:C.s24,r:3}}  strokeDasharray="5 2"/>
                  </ComposedChart>
                </ResponsiveContainer>
              );
            })()}
          </div>

        </div>
      )}

      {/* ── 세그먼트 ── */}
      {mainTab==='segment' && (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <div style={{gridColumn:'1/-1'}}>
            <PrevInsight items={[
              {label:'전년 연간 성별 판매율 / 현 재고 기준', desc:`W ${skView==='24S'?(D24.gen.W.p_sales/D24.gen.W.p_ops*100).toFixed(1):skView==='25S'?(D25.gen.W.p_sales/D25.gen.W.p_ops*100).toFixed(1):((D25.gen.W.p_sales+D24.gen.W.p_sales)/(D25.gen.W.p_ops+D24.gen.W.p_ops)*100).toFixed(1)}% / M ${skView==='24S'?(D24.gen.M.p_sales/D24.gen.M.p_ops*100).toFixed(1):skView==='25S'?(D25.gen.M.p_sales/D25.gen.M.p_ops*100).toFixed(1):((D25.gen.M.p_sales+D24.gen.M.p_sales)/(D25.gen.M.p_ops+D24.gen.M.p_ops)*100).toFixed(1)}%`},
              {label:'특이점', desc: skView==='25S'?'25S 여성 운영재고 비중 77% — 여성 중심 시즌':skView==='24S'?'24S 남성 운영재고 비중 70% — 남성 2년차 재고 부담':' 전체 여성 63% vs 남성 40% — 시즌별 성비 역전'},
            ]}/>
          </div>

          {/* 성별 현황 */}
          <div style={{background:C.card,borderRadius:12,padding:18,border:`1px solid ${C.border}`}}>
            <h3 style={{margin:'0 0 12px',fontSize:13}}>성별 현 재고 <SKBadge sk={skView}/></h3>
            {(['W','M','X']).map(g=>{
              const genRows = skView==='ALL'
                ? {t_ops:D25.gen[g].t_ops+D24.gen[g].t_ops, t_sales:D25.gen[g].t_sales+D24.gen[g].t_sales,
                   p_ops:D25.gen[g].p_ops+D24.gen[g].p_ops, p_sales:D25.gen[g].p_sales+D24.gen[g].p_sales}
                : skView==='25S'
                  ? {t_ops:D25.gen[g].t_ops, t_sales:D25.gen[g].t_sales, p_ops:D25.gen[g].p_ops, p_sales:D25.gen[g].p_sales}
                  : {t_ops:D24.gen[g].t_ops, t_sales:D24.gen[g].t_sales, p_ops:D24.gen[g].p_ops, p_sales:D24.gen[g].p_sales};
              if(genRows.t_ops===0) return null;
              const tp = genRows.t_sales/genRows.t_ops*100;
              const pp = genRows.p_ops>0?genRows.p_sales/genRows.p_ops*100:0;
              // 전년 기말재고 기준 목표: 전년 이 성별 운영비중 × 전체 기말재고 비율
              const genW = genRows.p_ops>0 ? genRows.p_ops/V.p_ops : 0;
              const yearendGoal = genW>0 ? (1 - V.prev_yearend_stock*genW/genRows.p_ops)*100 : pp;
              const gLabel = g==='W'?'여성':g==='M'?'남성':'젠더리스';
              const gColor = g==='W'?C.W:g==='M'?C.M:C.X;
              return (
                <div key={g} style={{marginBottom:14}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                    <span style={{fontSize:12,fontWeight:700,color:gColor}}>{gLabel}</span>
                    <div style={{fontSize:10,color:C.muted,display:'flex',gap:12}}>
                      <span>운영 {억(genRows.t_ops)}</span>
                      <span style={{color:V.color}}>현 재고 {억(Math.max(genRows.t_ops-(genRows.t_sales||0),0))}</span>
                      <span style={{color:C.prev}}>전년 연간 성별 판매율 {pp.toFixed(1)}%</span>
                    </div>
                  </div>
                  {/* 잔여재고 바: 전체 중 남은 비율, 목표선=전년기말잔여 */}
                  <div style={{position:'relative',background:'#0a1020',borderRadius:4,height:8}}>
                    <div style={{position:'absolute',width:`${Math.min(100-tp,100)}%`,height:'100%',background:gColor,borderRadius:4,opacity:.7}}/>
                    <div style={{position:'absolute',top:-2,left:`${Math.min(100-yearendGoal,100)}%`,width:2,height:12,background:C.bad,borderRadius:1}}/>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',marginTop:3}}>
                    <span style={{fontSize:9,color:gColor}}>현 재고 {억(Math.max(genRows.t_ops-(genRows.t_sales||0),0))}</span>
                    <span style={{fontSize:9,color:C.bad}}>전년기말 기준 {억(V.prev_yearend_stock*genW)}</span>
                  </div>
                </div>
              );
            })}
          </div>

          {/* 품목 테이블 */}
          <div style={{background:C.card,borderRadius:12,padding:18,border:`1px solid ${C.border}`}}>
            <h3 style={{margin:'0 0 12px',fontSize:13}}>품목별 현황 <SKBadge sk={skView}/></h3>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:10}}>
              <thead>
                <tr style={{borderBottom:`1px solid ${C.border}`}}>
                  {['품목','운영','10주판매','현 재고','전년연말잔여','판정'].map(h=>(
                    <th key={h} style={{padding:'4px 6px',color:C.muted,textAlign:h==='품목'?'left':'right',fontWeight:500}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {(()=>{
                  const catMap = {};
                  const addCat = (catObj) => {
                    Object.entries(catObj).forEach(([cat,v])=>{
                      if(!catMap[cat]) catMap[cat]={t_ops:0,t_s:0,p_ops:0,p_all:0};
                      catMap[cat].t_ops+=v.t_ops; catMap[cat].t_s+=v.t_s||0;
                      catMap[cat].p_ops+=v.p_ops; catMap[cat].p_all+=v.p_all||0;
                    });
                  };
                  if(skView==='ALL'||skView==='25S') addCat(D25.cat);
                  if(skView==='ALL'||skView==='24S') addCat(D24.cat);
                  return Object.entries(catMap)
                    .filter(([,v])=>v.t_ops>0)
                    .sort((a,b)=>b[1].t_ops-a[1].t_ops)
                    .slice(0,10)
                    .map(([cat,v],i)=>{
                      const tRemain = Math.max(v.t_ops - v.t_s, 0);
                      const pRemain = v.p_ops>0 ? Math.max(v.p_ops - v.p_all, 0) : 0;
                      // 판정: 올해 잔여가 전년 잔여보다 낮으면 양호
                      const ratio = pRemain>0 ? tRemain/pRemain : 1;
                      const color = ratio<0.8?C.good:ratio<1.1?C.warn:C.bad;
                      const badge = ratio<0.8?'양호':ratio<1.1?'주의':'위험';
                      return (
                        <tr key={cat} style={{borderBottom:`1px solid ${C.card2}`,background:i%2?'rgba(255,255,255,.01)':'transparent'}}>
                          <td style={{padding:'5px 6px',fontWeight:700}}>{cat}</td>
                          <td style={{padding:'5px 6px',color:C.muted,textAlign:'right'}}>{억(v.t_ops)}</td>
                          <td style={{padding:'5px 6px',color:V.color,textAlign:'right'}}>{억2(v.t_s)}</td>
                          <td style={{padding:'5px 6px',textAlign:'right',fontWeight:700,color:color}}>{억(tRemain)}</td>
                          <td style={{padding:'5px 6px',color:C.prev,textAlign:'right'}}>{pRemain>0?억(pRemain):'-'}</td>
                          <td style={{padding:'5px 6px',textAlign:'right'}}>
                            <span style={{padding:'1px 6px',borderRadius:10,fontSize:9,fontWeight:700,background:`${color}22`,color}}>{badge}</span>
                          </td>
                        </tr>
                      );
                    });
                })()}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── 전년 인사이트 ── */}
      {mainTab==='insight' && (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <div style={{background:C.card,borderRadius:12,padding:18,border:`1px solid ${C.border}`}}>
            <h3 style={{margin:'0 0 12px',fontSize:13}}>전년 월별 판매 패턴</h3>
            <ResponsiveContainer width="100%" height={180}>
              <BarChart data={periodData}>
                <CartesianGrid strokeDasharray="3 3" stroke="#0a1020"/>
                <XAxis dataKey="period" tick={{fill:C.muted,fontSize:10}}/>
                <YAxis tickFormatter={v=>(v/1e8).toFixed(0)} tick={{fill:C.muted,fontSize:9}} unit="억"/>
                <Tooltip content={<Tip/>}/>
                <Bar dataKey="prev" name="전년 실적" fill={C.prev} radius={[3,3,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </div>

          <div style={{background:C.card,borderRadius:12,padding:18,border:`1px solid ${C.border}`}}>
            <h3 style={{margin:'0 0 12px',fontSize:13}}>전년 주차별 패턴 <SKBadge sk={skView}/></h3>
            <ResponsiveContainer width="100%" height={180}>
              <BarChart data={weekData.map(d=>({week:d.week,prev:d.prev}))}>
                <CartesianGrid strokeDasharray="3 3" stroke="#0a1020"/>
                <XAxis dataKey="week" tick={{fill:C.muted,fontSize:8}} interval={4}/>
                <YAxis tickFormatter={v=>(v/1e8).toFixed(1)} tick={{fill:C.muted,fontSize:9}} unit="억"/>
                <Tooltip content={<Tip/>}/>
                <ReferenceLine x="06/29" stroke={C.accent} strokeDasharray="4 3" label={{value:'피크',fill:C.accent,fontSize:9}}/>
                <Bar dataKey="prev" name="전년 판매" fill={C.prev} radius={[2,2,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </div>

          <div style={{background:C.card,borderRadius:12,padding:18,border:`1px solid ${C.border}`,gridColumn:'1/-1'}}>
            <h3 style={{margin:'0 0 14px',fontSize:13}}>주요 인사이트 & 올해 시사점</h3>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
              {[
                {title:'① 적정 판기', icon:'📅', color:C.accent,
                 prev:`5월 중순~6월 말 핵심 판기 — 이 구간 전체의 ${((ALL_PC[25]-ALL_PC[18])/ALL_PC[52]*100).toFixed(0)}% 집중 (6/29 단주 ${억2(ALL_PREV[25])})`,
                 imp:'6/29 단주 급등은 세일 시작 일시 현상 — 중요한 건 5월부터 6월 말까지의 구간 관리',
                 action:'5월 초부터 포지셔닝 시작, 6월 말까지 꾸준한 재고 노출 유지'},
                {title:'② 25S WJ 여성 집중', icon:'🧥', color:C.s25,
                 prev:`25S WJ ${억(D25.cat.WJ.t_ops)} 운영 — 전체의 44%`,
                 imp:'여성 비중 높아 할인 없이도 소진 가능성. 정상가 유지 전략 유효',
                 action:'3-4월 정상가 판매 집중, 5월 이후 선별 할인'},
                {title:'③ 24S 남성 2년차 부담', icon:'⚠️', color:C.s24,
                 prev:`24S 남성 운영 ${억(D24.gen.M.t_ops)} — 24S 전체의 70%`,
                 imp:'2년차 목표: 전년 기말재고(23S 41.5억) 이하 소진 — 남성 집중도가 핵심 리스크',
                 action:'24S 남성 선제 할인, 아울렛 채널 집중'},
                {title:'④ DH 초반 소진 우수', icon:'❄️', color:C.good,
                 prev:`전년 DH 동기 10주 ${억2(ALL_PREV[24] - ALL_PREV[16])} — 초반에 집중 판매`,
                 imp:'DH는 1-2월에 정상가 소진 가능한 몇 안 되는 품목',
                 action:'DH 정상가 유지 권장, 3월까지 할인 보류'},
                {title:'⑤ SP·TS 세일 의존', icon:'👕', color:C.warn,
                 prev:'전년 SP 연간 51%, TS 72% — SP는 전량 세일 구간에서 판매',
                 imp:'올해 SP 10주 0.7% — 정상 궤도. 세일 구간까지 보유 전략 유효',
                 action:'SP·TS 조기 할인 역효과. 5월 말 세일까지 보유'},
                {title:'⑥ 할인율 — 올해 인하 최소화 기조', icon:'💸', color:C.bad,
                 prev:'전년 25S 실매출/택가 기준 할인율 약 30% / 24S 약 37% — 2년차로 갈수록 심화',
                 imp:'올해 기조: 추가 인하 최소화. 단, 2년차(24S) 잔여가 많아질 경우 채널 분산이 현실적 대안',
                 action:'정상가 방어 우선 → 소진 부진 시 아울렛 물량 조정으로 대응'},
              ].map(({title,icon,color,prev,imp,action})=>(
                <div key={title} style={{background:C.card2,borderRadius:10,padding:14,borderTop:`3px solid ${color}`}}>
                  <p style={{margin:'0 0 8px',fontSize:12,fontWeight:700,color}}>{icon} {title}</p>
                  <p style={{margin:'0 0 5px',fontSize:10,color:C.muted,lineHeight:1.6}}>
                    <span style={{color:C.prev,fontWeight:600}}>전년: </span>{prev}
                  </p>
                  <p style={{margin:'0 0 6px',fontSize:10,color:C.muted,lineHeight:1.6}}>
                    <span style={{color:V.color,fontWeight:600}}>시사점: </span>{imp}
                  </p>
                  <p style={{margin:0,fontSize:10,color:C.text,lineHeight:1.6,background:`${color}11`,borderRadius:6,padding:'6px 8px'}}>
                    → {action}
                  </p>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      <p style={{textAlign:'right',color:C.muted,fontSize:9,marginTop:16}}>
        실측: 판매기준_올해.xlsx / 매출기준_올해.xlsx (01/04~03/08, 10주) · 예측: 전년 동시즌 패턴 × 운영재고 비율 스케일 · 시즌별 분리 계산 후 합산
      </p>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
